<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ثبّت - سورة البقرة ورش</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>📖 ثبّت</h1>

<h2>سورة البقرة - رواية ورش</h2>

<div class="progress">

<div id="bar"></div>

</div>

<p id="progressText">
0 / 39 ثمن
</p>

</header>



<main id="athman"></main>




<!-- نافذة الثمن -->

<div id="popup">


<div class="box">


<h2 id="title"></h2>


<div id="info"></div>



<h3>🔁 عدد التكرار</h3>


<div class="counter">


<button id="minus">
-
</button>


<span id="count">
0
</span>


<button id="plus">
+
</button>


</div>



<hr>



<h3>🎙️ تسميع الثمن</h3>


<div class="record-status" id="status">

جاهز للتسجيل

</div>



<button id="recordBtn">

🎙️ بدء التسجيل

</button>



<button id="stopBtn" disabled>

⏹️ إيقاف التسجيل

</button>



<audio id="audioPlayer" controls></audio>



<button id="deleteVoice">

🗑️ حذف التسجيل

</button>



<hr>



<button class="save" id="saveBtn">

✅ تم الحفظ

</button>



<button class="close" id="closeBtn">

إغلاق

</button>



</div>

</div>



<script src="app.js"></script>


</body>

</html>
